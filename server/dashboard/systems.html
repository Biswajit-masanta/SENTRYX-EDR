<script src="app.js"></script>
<script>
/* ==========================================================================
   Systems page logic — GET /systems, render searchable/filterable table
   ========================================================================== */
(function(){
  const { ICONS, getJSON, ENDPOINTS, normalizeSystem, timeAgo, osIcon, emptyState, errorState, POLL_INTERVAL_MS } = SENTRYX;

  const tbody = document.getElementById("sysTableBody");
  const sysCount = document.getElementById("sysCount");
  const searchInput = document.getElementById("sysSearch");
  const osFilter = document.getElementById("sysOsFilter");
  const statusFilter = document.getElementById("sysStatusFilter");
  const refreshBtn = document.getElementById("sysRefresh");

  let allSystems = [];
  let osOptionsBuilt = false;

  function statusOf(s) { return (s.raw?.status || "").toLowerCase() === "online" ? "online" : "offline"; }

  function row(s) {
    const status = statusOf(s);
    return `<tr>
      <td>
        <div class="row-host">
          <span class="host-dot ${status}"></span>
          <div>
            <div class="cell-main">${escapeHtml(s.hostname)}</div>
            <div class="cell-sub mono">${escapeHtml(s.ip || s.id)}</div>
          </div>
        </div>
      </td>
      <td><span class="os-chip">${osIcon(s.os)} ${escapeHtml(s.os)}${s.osVersion ? " " + escapeHtml(s.osVersion) : ""}</span></td>
      <td>${escapeHtml(s.processor)}</td>
      <td class="mono">${escapeHtml(String(s.cpuCount))}</td>
      <td class="mono">${escapeHtml(String(s.pythonVersion))}</td>
      <td class="mono">${timeAgo(s.lastSeen)}</td>
      <td><span class="badge st-${status}">${status}</span></td>
    </tr>`;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function buildOsOptions(systems) {
    if (osOptionsBuilt) return;
    const oses = [...new Set(systems.map(s => s.os))].sort();
    osFilter.innerHTML = `<option value="">All operating systems</option>` +
      oses.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
    osOptionsBuilt = true;
  }

  function applyFiltersAndRender() {
    const q = searchInput.value.trim().toLowerCase();
    const osVal = osFilter.value;
    const stVal = statusFilter.value;

    const filtered = allSystems.filter(s => {
      const matchesQ = !q || [s.hostname, s.os, s.processor, s.pythonVersion].join(" ").toLowerCase().includes(q);
      const matchesOs = !osVal || s.os === osVal;
      const matchesSt = !stVal || statusOf(s) === stVal;
      return matchesQ && matchesOs && matchesSt;
    });

    if (!allSystems.length) {
      tbody.innerHTML = `<tr><td colspan="7">${emptyState({
        icon: ICONS.server,
        title: "No endpoints enrolled",
        body: "Install the SENTRYX agent on a host and it will appear here automatically once it reports to /systems."
      })}</td></tr>`;
    } else if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="7">${emptyState({
        icon: ICONS.search,
        title: "No matching endpoints",
        body: "Try a different search term or clear the active filters."
      })}</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(row).join("");
    }
    sysCount.textContent = `${filtered.length} of ${allSystems.length} endpoint${allSystems.length === 1 ? "" : "s"}`;
  }

  async function load() {
    if (!allSystems.length) tbody.innerHTML = SENTRYX.loadingRows(7, 5);
    try {
      const data = await getJSON(ENDPOINTS.systems);
      allSystems = data.map(normalizeSystem);
      buildOsOptions(allSystems);
      applyFiltersAndRender();
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7">${errorState(load, "endpoint inventory")}</td></tr>`;
      sysCount.textContent = "Connection error";
    }
  }

  searchInput.addEventListener("input", applyFiltersAndRender);
  osFilter.addEventListener("change", applyFiltersAndRender);
  statusFilter.addEventListener("change", applyFiltersAndRender);
  refreshBtn.addEventListener("click", load);

  load();
  setInterval(load, POLL_INTERVAL_MS);
})();
</script>
