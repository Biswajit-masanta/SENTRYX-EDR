<script src="app.js"></script>
<script>
/* ==========================================================================
   Processes page — GET /processes, summary cards + filterable table
   Reuses SENTRYX helpers from app.js — no duplicate API wrappers.
   ========================================================================== */
(function () {
  'use strict';

  const { ICONS, ENDPOINTS, POLL_INTERVAL_MS,
          getJSON, normalizeProcess,
          emptyState, errorState, loadingRows } = SENTRYX;

  /* DOM */
  const statGrid    = document.getElementById('procStatGrid');
  const tbody       = document.getElementById('procTableBody');
  const procCount   = document.getElementById('procCount');
  const lastUpdate  = document.getElementById('procLastUpdate');
  const searchInput = document.getElementById('procSearch');
  const riskSel     = document.getElementById('riskFilter');
  const statusSel   = document.getElementById('statusFilter');
  const refreshBtn  = document.getElementById('procRefresh');

  /* State */
  let allProcesses = [];
  let sortCol = 'cpu';
  let sortAsc = false;

  /* ── Helpers ─────────────────────────────────────────── */
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function initials(name) {
    return name.replace(/\.(exe|app|bin|sh|py|rb|pl)$/i, '').slice(0, 3).toUpperCase();
  }
  function fmt(n)  { return n != null ? n.toFixed(1) + '%' : '—'; }
  function pct(n)  { return n != null ? Math.min(100, Math.max(0, n)) : 0; }
  function cpuColor(n)  { return n > 80 ? 'var(--danger)' : n > 50 ? 'var(--warning)' : 'var(--cyan)'; }
  function memColor(n)  { return n > 80 ? 'var(--danger)' : n > 50 ? 'var(--warning)' : 'var(--violet)'; }

  /* ── Stat cards ──────────────────────────────────────── */
  function renderStatCards(procs) {
    const total  = procs.length;
    const high   = procs.filter(p => p.riskLevel === 'high').length;
    const medium = procs.filter(p => p.riskLevel === 'medium').length;
    const low    = procs.filter(p => p.riskLevel === 'low').length;
    const topCpu = procs.filter(p => p.riskLevel === 'high' && p.cpu != null)
                        .reduce((m, p) => Math.max(m, p.cpu), 0);

    const cards = [
      { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 10h10M4 14h12M4 18h8"/><circle cx="19" cy="15" r="3"/></svg>`,
        cls: 'cyan',    value: total,  label: 'Total Running Processes', sub: 'across all endpoints' },
      { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 4l9 16H3z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".6" fill="currentColor"/></svg>`,
        cls: 'danger',  value: high,   label: 'High Risk Processes',     sub: high > 0 ? `peak CPU ${topCpu.toFixed(1)}%` : 'none detected' },
      { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>`,
        cls: 'warning', value: medium, label: 'Medium Risk Processes',   sub: medium > 0 ? 'review recommended' : 'all clear' },
      { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 13l4 4L19 7"/></svg>`,
        cls: 'success', value: low,    label: 'Low Risk Processes',      sub: total > 0 ? `${((low/total)*100).toFixed(0)}% of total` : '—' },
    ];

    statGrid.innerHTML = cards.map((c, i) => `
      <div class="card stat-card" style="animation-delay:${i*0.06}s">
        <div class="stat-top"><div class="stat-icon ${esc(c.cls)}">${c.icon}</div></div>
        <div class="stat-value">${esc(String(c.value))}</div>
        <div class="stat-label">${esc(c.label)}</div>
        <div class="stat-label" style="margin-top:5px;color:var(--text-faint);font-size:11px">${esc(c.sub)}</div>
      </div>`).join('');
  }

  /* ── Table row ───────────────────────────────────────── */
  function buildRow(p) {
    const risk   = p.riskLevel || 'unknown';
    const status = p.status    || 'unknown';
    return `<tr>
      <td>
        <div class="proc-name-cell">
          <div class="proc-icon risk-${esc(risk)}">${esc(initials(p.name))}</div>
          <div class="cell-main">${esc(p.name)}</div>
        </div>
      </td>
      <td class="mono">${esc(String(p.pid))}</td>
      <td>
        <div class="row-host">
          <span class="host-dot ${p.hostname && p.hostname !== '—' ? 'online' : 'offline'}"></span>
          <span class="mono" style="font-size:12.5px">${esc(p.hostname || '—')}</span>
        </div>
      </td>
      <td>
        <div class="usage-cell">
          <span class="usage-num">${esc(fmt(p.cpu))}</span>
          <div class="usage-bar-track">
            <div class="usage-bar-fill" style="width:${pct(p.cpu)}%;background:${cpuColor(p.cpu ?? 0)}"></div>
          </div>
        </div>
      </td>
      <td>
        <div class="usage-cell">
          <span class="usage-num">${esc(fmt(p.memory))}</span>
          <div class="usage-bar-track">
            <div class="usage-bar-fill" style="width:${pct(p.memory)}%;background:${memColor(p.memory ?? 0)}"></div>
          </div>
        </div>
      </td>
      <td><span class="badge st-${esc(status)}">${esc(status)}</span></td>
      <td><span class="badge risk-${esc(risk)}">${esc(risk.toUpperCase())}</span></td>
      <td>
        <div class="exe-path-cell">
          <span class="exe-path-text">${esc(p.exePath)}</span>
          <div class="exe-tooltip">${esc(p.exePath)}</div>
        </div>
      </td>
    </tr>`;
  }

  /* ── Sort ────────────────────────────────────────────── */
  function sorted(procs) {
    return [...procs].sort((a, b) => {
      const va = (sortCol === 'cpu' ? a.cpu : a.memory) ?? -1;
      const vb = (sortCol === 'cpu' ? b.cpu : b.memory) ?? -1;
      return sortAsc ? va - vb : vb - va;
    });
  }
  function syncHeaders() {
    document.querySelectorAll('th.th-sortable').forEach(th => {
      const on = th.dataset.col === sortCol;
      th.classList.toggle('sort-active', on);
      const arrow = th.querySelector('.sort-arrow');
      if (arrow) { arrow.style.display = on ? 'inline' : 'none'; arrow.textContent = sortAsc ? '↑' : '↓'; }
    });
  }

  /* ── Filter + render ─────────────────────────────────── */
  function applyAndRender() {
    const q      = searchInput.value.trim().toLowerCase();
    const risk   = riskSel.value;
    const status = statusSel.value;

    const filtered = sorted(allProcesses).filter(p => {
      const mQ  = !q      || [p.name, String(p.pid), p.exePath].join(' ').toLowerCase().includes(q);
      const mR  = !risk   || p.riskLevel === risk;
      const mSt = !status || p.status    === status;
      return mQ && mR && mSt;
    });

    if (!allProcesses.length) {
      tbody.innerHTML = `<tr><td colspan="8">${emptyState({
        icon: ICONS.server,
        title: 'No processes found',
        body: 'GET /processes returned an empty list. Once your EDR agent reports process telemetry it will appear here.',
      })}</td></tr>`;
    } else if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="8">${emptyState({
        icon: ICONS.search,
        title: 'No matching processes',
        body: 'Try a different search term or clear the active filters.',
      })}</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(buildRow).join('');
    }

    const total = allProcesses.length;
    procCount.textContent = filtered.length === total
      ? `${total} process${total === 1 ? '' : 'es'}`
      : `${filtered.length} of ${total} process${total === 1 ? '' : 'es'}`;
  }

  /* ── Fetch ───────────────────────────────────────────── */
  async function load() {
    if (!allProcesses.length) tbody.innerHTML = loadingRows(7, 6);
    try {
      const raw = await getJSON(ENDPOINTS.processes);
      allProcesses = raw.map(normalizeProcess);
      renderStatCards(allProcesses);
      applyAndRender();
      lastUpdate.textContent = `Last updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})} · Auto-refreshes every 10s`;
    } catch (err) {
      if (!allProcesses.length) {
        tbody.innerHTML = `<tr><td colspan="8">${errorState(load, 'process list')}</td></tr>`;
        procCount.textContent = 'Connection error';
      }
      lastUpdate.textContent = 'Failed to refresh — retrying in 10s';
    }
  }

  /* ── Wire events ─────────────────────────────────────── */
  searchInput.addEventListener('input', applyAndRender);
  riskSel.addEventListener('change', applyAndRender);
  statusSel.addEventListener('change', applyAndRender);
  refreshBtn.addEventListener('click', load);

  document.querySelectorAll('th.th-sortable').forEach(th => {
    th.addEventListener('click', () => {
      sortCol === th.dataset.col ? (sortAsc = !sortAsc) : (sortCol = th.dataset.col, sortAsc = false);
      syncHeaders();
      applyAndRender();
    });
  });

  load();
  setInterval(load, POLL_INTERVAL_MS);
})();
</script>
