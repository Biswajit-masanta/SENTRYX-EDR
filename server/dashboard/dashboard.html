<script src="app.js"></script>
<script>
/* ==========================================================================
   Dashboard page logic
   ========================================================================== */
(function(){
  const { ICONS, getJSON, ENDPOINTS, normalizeSystem, normalizeAlert, normalizeUsage,
          timeAgo, isRecent, loadingRows, emptyState, errorState, POLL_INTERVAL_MS } = SENTRYX;

  const statGrid = document.getElementById("statGrid");
  const activityFeed = document.getElementById("activityFeed");
  const activityMeta = document.getElementById("activityMeta");
  let severityChart = null;

  function statCard({icon, cls, label, value, sub}) {
    return `<div class="card stat-card">
      <div class="stat-top">
        <div class="stat-icon ${cls}">${icon}</div>
      </div>
      <div class="stat-value">${value}</div>
      <div class="stat-label">${label}</div>
      ${sub ? `<div class="stat-label" style="margin-top:6px;color:var(--text-faint);font-size:11px">${sub}</div>` : ""}
    </div>`;
  }

  function healthCard(score) {
    const pct = Math.max(0, Math.min(100, score));
    const circumference = 2 * Math.PI * 26;
    const dash = (pct/100) * circumference;
    const color = pct >= 80 ? "var(--success)" : pct >= 50 ? "var(--warning)" : "var(--danger)";
    return `<div class="card stat-card health-card">
      <div class="gauge-wrap">
        <svg viewBox="0 0 64 64">
          <circle class="gauge-bg" cx="32" cy="32" r="26"/>
          <circle class="gauge-fg" cx="32" cy="32" r="26" stroke="${color}"
            stroke-dasharray="${dash} ${circumference}"/>
        </svg>
        <div class="gauge-num">${Math.round(pct)}</div>
      </div>
      <div>
        <div class="stat-value" style="font-size:18px">${pct >= 80 ? "Healthy" : pct >= 50 ? "Degraded" : "At Risk"}</div>
        <div class="stat-label">System Health Score</div>
      </div>
    </div>`;
  }

  function renderSkeletonStats() {
    statGrid.innerHTML = Array.from({length: 5}).map(() => `
      <div class="card stat-card">
        <div class="skel skel-row w-40" style="height:28px;width:34px;border-radius:9px"></div>
        <div class="skel skel-row w-60" style="height:24px;margin-top:16px"></div>
        <div class="skel skel-row w-80" style="height:11px"></div>
      </div>`).join("");
  }

  function activityRow(a) {
    const sevColor = { critical:"danger", high:"danger", medium:"warning", low:"cyan" }[a.severity] || "cyan";
    return `<div class="activity-row">
      <div class="activity-icon stat-icon ${sevColor}">${ICONS.siren}</div>
      <div class="activity-body">
        <div class="activity-title">${a.type}${a.hostname ? ` · ${a.hostname}` : ""}</div>
        <div class="activity-sub">${a.message || "Detected by behavioral analytics engine"}</div>
      </div>
      <div class="activity-time">${timeAgo(a.timestamp)}</div>
    </div>`;
  }

  async function load() {
    renderSkeletonStats();
    activityFeed.innerHTML = `<div class="state-block" style="padding:30px"><div class="spinner"></div></div>`;

    let systems = [], alerts = [], usage = [];
    let systemsErr = false, alertsErr = false, usageErr = false;

    await Promise.all([
      getJSON(ENDPOINTS.systems).then(d => systems = d.map(normalizeSystem)).catch(() => systemsErr = true),
      getJSON(ENDPOINTS.alerts).then(d => alerts = d.map(normalizeAlert)).catch(() => alertsErr = true),
      getJSON(ENDPOINTS.resourceUsage).then(d => usage = d.map(normalizeUsage)).catch(() => usageErr = true),
    ]);

    console.log("Systems:", systems);
    console.log("Alerts:", alerts);
    console.log("Usage:", usage);


    // ---- Stat values derived from real API data ----
    const totalEndpoints = systems.length;
    const onlineEndpoints = systems.filter(s => isRecent(s.lastSeen, 5 * 60000)).length;
    const activeAlerts = alerts.filter(a => a.status !== "resolved").length;
    const resolvedAlerts = alerts.filter(a => a.status === "resolved").length;
    const reportsReceived = usage.length;

    // Health score: penalize for active critical/high alerts and high average resource load
    const avgLoad = usage.length
      ? usage.reduce((s,u) => s + ((u.cpu||0)+(u.memory||0)+(u.disk||0))/3, 0) / usage.length
      : 0;
    const criticalPenalty = alerts.filter(a => a.severity === "critical" && a.status !== "resolved").length * 8;
    const highPenalty = alerts.filter(a => a.severity === "high" && a.status !== "resolved").length * 4;
    const healthScore = Math.max(0, Math.min(100, 100 - (avgLoad * 0.35) - criticalPenalty - highPenalty));

    if (systemsErr && alertsErr && usageErr) {
      statGrid.innerHTML = `<div class="card" style="grid-column:1/-1">${errorState(load, "dashboard metrics")}</div>`;
    } else {
      statGrid.innerHTML = [
        statCard({icon: ICONS.server, cls: "cyan", label: "Total Endpoints", value: totalEndpoints, sub: systems.length
        ? systems[0].hostname
        : "No systems connected"}),
        statCard({icon: ICONS.siren, cls: "danger", label: "Active Alerts", value: activeAlerts, sub:`${new Set(alerts.filter(a => a.status !== "resolved").map(a => a.systemId)).size} affected endpoint(s)`}),
        statCard({icon: ICONS.check, cls: "success", label: "Resolved Alerts", value: resolvedAlerts, sub: "All-time closed"}),
        statCard({icon: ICONS.activity, cls: "violet", label: "Reports Received", value: reportsReceived, sub: "Resource-usage telemetry"}),
        healthCard(healthScore),
      ].join("");
    }

    // ---- Activity feed: merge alerts + usage spikes, sort by recency ----
    if (alertsErr && usageErr) {
      activityFeed.innerHTML = errorState(load, "recent activity");
    } else {
      const events = [
        ...alerts.map(a => ({ ...a, kind: "alert" })),
      ].sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0)).slice(0, 12);

      if (!events.length) {
        activityFeed.innerHTML = emptyState({
          icon: ICONS.activity,
          title: "No activity yet",
          body: "Once your endpoints start reporting alerts, they'll appear here in real time."
        });
      } else {
        activityFeed.innerHTML = events.map(activityRow).join("");
      }
      activityMeta.textContent = `${events.length} events`;
    }

    // ---- Severity donut ----
    renderSeverityChart(alerts);
  }

  function renderSeverityChart(alerts) {
    const canvas = document.getElementById("severityChart");
    const order = ["critical","high","medium","low"];
    const counts = order.map(s => alerts.filter(a => a.severity === s).length);
    const colors = ["#ff3b5c","#ff8c28","#ffb020","#5b8def"];

    if (!alerts.length) {
      canvas.parentElement.innerHTML = `<div class="state-block" style="padding:30px 10px">${SENTRYX.ICONS.shield}<h4>No alerts recorded</h4><p>Severity breakdown will populate once alerts start arriving from /alerts.</p></div>`;
      return;
    }
    if (severityChart) severityChart.destroy();
    severityChart = new Chart(canvas, {
      type: "doughnut",
      data: { labels: ["Critical","High","Medium","Low"], datasets: [{ data: counts, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
      options: {
        cutout: "68%",
        plugins: { legend: { position: "bottom", labels: { color: "#97a3ba", boxWidth: 10, font: { size: 11, family: "Inter" } } } },
        maintainAspectRatio: false,
      }
    });
  }

  load();
  setInterval(load, POLL_INTERVAL_MS);
})();
</script>
