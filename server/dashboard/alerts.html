<!-- Alert detail drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6 6 18"/></svg>
  </button>
  <span class="badge" id="drawerSeverity"></span>
  <h3 id="drawerTitle">—</h3>
  <div class="drawer-meta-row"><span class="k">Host</span><span class="v" id="drawerHost">—</span></div>
  <div class="drawer-meta-row"><span class="k">Status</span><span class="v" id="drawerStatus">—</span></div>
  <div class="drawer-meta-row"><span class="k">Detected</span><span class="v" id="drawerTime">—</span></div>
  <div class="drawer-meta-row"><span class="k">Alert ID</span><span class="v mono" id="drawerId">—</span></div>
  <div class="drawer-desc" id="drawerDesc">—</div>
</aside>

<script src="app.js"></script>
<script>
/* ==========================================================================
   Alerts page logic — GET /alerts, render table + detail drawer
   ========================================================================== */
(function(){
  const { ICONS, getJSON, ENDPOINTS, normalizeAlert, emptyState, errorState, POLL_INTERVAL_MS } = SENTRYX;

  const tbody = document.getElementById("alertTableBody");
  const alertCount = document.getElementById("alertCount");
  const searchInput = document.getElementById("alertSearch");
  const sevFilter = document.getElementById("sevFilter");
  const statFilter = document.getElementById("statFilter");
  const refreshBtn = document.getElementById("alertRefresh");

  const drawer = document.getElementById("drawer");
  const drawerOverlay = document.getElementById("drawerOverlay");
  const drawerClose = document.getElementById("drawerClose");

  let allAlerts = [];

  function escapeHtml(str) {
    return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }
  function fmtTimestamp(ts) {
    if (!ts) return "—";
    const d = new Date(ts.replace ? ts.replace(" ", "T") : ts);
    return isNaN(d) ? String(ts) : d.toLocaleString();
  }

  function row(a) {
    return `<tr class="clickable" data-id="${escapeHtml(a.id)}">
      <td>
        <div class="cell-main">${escapeHtml(a.type)}</div>
        ${a.message ? `<div class="cell-sub">${escapeHtml(a.message).slice(0,64)}${a.message.length>64?"…":""}</div>` : ""}
      </td>
      <td class="mono">${escapeHtml(a.hostname || a.systemId || "—")}</td>
      <td><span class="badge sev-${escapeHtml(a.severity)}">${escapeHtml(a.severity)}</span></td>
      <td><span class="badge st-${escapeHtml(a.status)}">${escapeHtml(a.status)}</span></td>
      <td class="mono">${fmtTimestamp(a.timestamp)}</td>
    </tr>`;
  }

  function applyFiltersAndRender() {
    const q = searchInput.value.trim().toLowerCase();
    const sev = sevFilter.value;
    const st = statFilter.value;

    const filtered = allAlerts.filter(a => {
      const matchesQ = !q || [a.type, a.hostname, a.message].join(" ").toLowerCase().includes(q);
      const matchesSev = !sev || a.severity === sev;
      const matchesSt = !st || a.status === st;
      return matchesQ && matchesSev && matchesSt;
    }).sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));

    if (!allAlerts.length) {
      tbody.innerHTML = `<tr><td colspan="5">${emptyState({
        icon: ICONS.shield,
        title: "No alerts detected",
        body: "Your environment is quiet. New detections from /alerts will appear here the moment they fire."
      })}</td></tr>`;
    } else if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="5">${emptyState({
        icon: ICONS.search,
        title: "No matching alerts",
        body: "Adjust your search or clear the severity/status filters to see more results."
      })}</td></tr>`;
    } else {
      tbody.innerHTML = filtered.map(row).join("");
      tbody.querySelectorAll("tr.clickable").forEach(tr => {
        tr.addEventListener("click", () => openDrawer(tr.dataset.id));
      });
    }
    alertCount.textContent = `${filtered.length} of ${allAlerts.length} alert${allAlerts.length === 1 ? "" : "s"}`;
  }

  function openDrawer(id) {
    const a = allAlerts.find(x => String(x.id) === String(id));
    if (!a) return;
    document.getElementById("drawerSeverity").className = `badge sev-${a.severity}`;
    document.getElementById("drawerSeverity").textContent = a.severity;
    document.getElementById("drawerTitle").textContent = a.type;
    document.getElementById("drawerHost").textContent = a.hostname || a.systemId || "—";
    document.getElementById("drawerStatus").textContent = a.status;
    document.getElementById("drawerTime").textContent = fmtTimestamp(a.timestamp);
    document.getElementById("drawerId").textContent = a.id;
    document.getElementById("drawerDesc").textContent = a.message || "No further detail was provided by the detection engine for this alert.";
    drawer.classList.add("show");
    drawerOverlay.classList.add("show");
  }
  function closeDrawer() {
    drawer.classList.remove("show");
    drawerOverlay.classList.remove("show");
  }
  drawerClose.addEventListener("click", closeDrawer);
  drawerOverlay.addEventListener("click", closeDrawer);

  async function load() {
    if (!allAlerts.length) tbody.innerHTML = SENTRYX.loadingRows(5, 5);
    try {
      const data = await getJSON(ENDPOINTS.alerts);
      allAlerts = data.map(normalizeAlert);
      applyFiltersAndRender();
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="5">${errorState(load, "alert queue")}</td></tr>`;
      alertCount.textContent = "Connection error";
    }
  }

  searchInput.addEventListener("input", applyFiltersAndRender);
  sevFilter.addEventListener("change", applyFiltersAndRender);
  statFilter.addEventListener("change", applyFiltersAndRender);
  refreshBtn.addEventListener("click", load);

  load();
  setInterval(load, POLL_INTERVAL_MS);
})();
</script>
</body>
